<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Sign Up | Odin Project</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="main-container">
        <section class="hero-section">
            <div class="logo-container">
                <img src="images/odin-logo.png" alt="Odin Logo" class="logo-img" />
                <h1 class="logo-text">ODIN</h1>
            </div>
            <p class="photo-credits">
                Photo by
                <a href="https://unsplash.com/@haliewestphoto" target="_blank">Halie West</a>
                on <a href="https://unsplash.com" target="_blank">Unsplash</a>
            </p>
        </section>

        <section class="form-section">
            <header class="form-header">
                <p class="text text-medium text-emphasized">
                    This is not a real online service! You know you need
                    something like this in your life to help you realize
                    your deepest dreams. Sign up now to get started.
                </p>
                <p class="text text-medium text-emphasized">

                    You <em>know</em> you want to.
                </p>
            </header>

            <form action="#" method="post" id="sign-up-form">
                <div class="form-wrapper">
                    <fieldset class="input-grid">

                        <h2 class="text text-medium text-emphasized">Let's do this</h2>

                        <div class="fieldContainer">
                            <div class="form-control">
                                <label for="first-name" class="text text-label">FIRST NAME</label>
                                <input type="text" id="first-name" name="first-name" class="form-input" />
                            </div>

                            <div class="form-control">
                                <label for="last-name" class="text text-label">LAST NAME</label>
                                <input type="text" id="last-name" name="last-name" class="form-input" required />
                            </div>

                            <div class="form-control">
                                <label for="email" class="text text-label">EMAIL</label>
                                <input type="email" id="email" name="email" class="form-input" required />
                            </div>

                            <div class="form-control">
                                <label for="phone-number" class="text text-label">PHONE NUMBER</label>
                                <input type="tel" id="phone-number" name="phone-number" class="form-input" />
                            </div>

                            <div class="form-control">
                                <label for="password" class="text text-label">PASSWORD</label>
                                <input type="password" id="password" name="password" class="form-input" required />
                            </div>

                            <div class="form-control">
                                <label for="confirm-password" class="text text-label">CONFIRM PASSWORD</label>
                                <input type="password" id="confirm-password" name="confirm-password" class="form-input"
                                    required />
                            </div>
                        </div>

                    </fieldset>
                </div>

            </form>
            
            <div class="form-footer">
                <button type="submit" class="btn btn-primary">Create Account</button>
                <p class="text text-small">
                    Already have an account?
                    <a href="#">Log in</a>
                </p>
            </div>
        </section>
    </div>
</body>

</html>
